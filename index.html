<style>
  :root {
    --bg: #0d0e10;
    --text: #e8e6e1;
    --text-dim: #8a8680;
    --text-dimmer: #55524e;
    --accent: #d4a574;
    --accent-glow: rgba(212, 165, 116, 0.15);
    --border: rgba(232, 230, 225, 0.08);
    --serif: 'Instrument Serif', serif;
    --sans: 'Inter Tight', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.6;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    min-height: 100vh;
    position: relative;
    z-index: 2;
  }

  .lang-toggle {
    position: fixed;
    top: 28px;
    right: 32px;
    display: flex;
    gap: 2px;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    z-index: 50;
    background: rgba(13, 14, 16, 0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px;
    animation: fadeUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .lang-toggle button {
    background: none;
    border: none;
    color: var(--text-dimmer);
    padding: 6px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
  }

  .lang-toggle button:hover { color: var(--text); }
  .lang-toggle button.active {
    color: var(--bg);
    background: var(--accent);
  }

  aside {
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 100px 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .intro h1 {
    font-family: var(--serif);
    font-size: clamp(2.6rem, 5.2vw, 4.2rem);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    white-space: nowrap;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .intro .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.35rem;
    color: var(--text-dim);
    margin-bottom: 24px;
    animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .intro .pitch {
    font-size: 0.95rem;
    color: var(--text-dim);
    max-width: 380px;
    animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .intro .pitch strong { color: var(--text); font-weight: 400; }

  nav {
    margin-top: 48px;
    animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  nav ul { list-style: none; }

  nav a {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    padding: 8px 0;
    color: var(--text-dimmer);
    text-decoration: none;
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  nav a::before {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: currentColor;
    transition: width 0.3s, background 0.3s;
  }

  nav a:hover, nav a.active { color: var(--text); }
  nav a:hover::before, nav a.active::before {
    width: 64px;
    background: var(--accent);
  }

  .socials {
    display: flex;
    gap: 28px;
    animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .socials a {
    color: var(--text-dim);
    transition: color 0.2s, transform 0.2s;
    display: inline-flex;
  }

  .socials a:hover { color: var(--accent); transform: translateY(-2px); }
  .socials svg { width: 34px; height: 34px; }

  main { padding: 100px 0; }

  section {
    margin-bottom: 72px;
    scroll-margin-top: 80px;
  }

  section:last-child { margin-bottom: 40px; }

  .section-label {
    display: block;
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 20px 0 16px;
    z-index: 10;
  }

  .prose p { color: var(--text-dim); margin-bottom: 16px; }
  .prose strong { color: var(--text); font-weight: 400; }

  .prose a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid var(--text-dimmer);
    transition: border-color 0.2s, color 0.2s;
  }

  .prose a:hover { color: var(--accent); border-color: var(--accent); }

  .card {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 24px;
    padding: 20px;
    margin: 0 -20px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background 0.3s, border-color 0.3s;
  }

  .card:hover {
    background: rgba(232, 230, 225, 0.025);
    border-color: var(--border);
  }

  .card:hover h3 { color: var(--accent); }
  .card:hover .arrow { transform: translate(3px, -3px); color: var(--accent); }

  .card .date {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--text-dimmer);
    text-transform: uppercase;
    padding-top: 4px;
  }

  .card h3 {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: 4px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px; }
  .card p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 14px; }

  .arrow { display: inline-block; transition: transform 0.3s, color 0.3s; }

  .tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    font-family: var(--mono);
    font-size: 0.68rem;
    padding: 4px 10px;
    border-radius: 100px;
    background: var(--accent-glow);
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 32px;
  }

  .skill-group h4 {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .skill-group ul { list-style: none; }

  .skill-group li {
    color: var(--text-dim);
    font-size: 0.9rem;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .skill-group li::before {
    content: '';
    width: 4px;
    height: 4px;
    background: var(--text-dimmer);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cv-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
    padding: 14px 20px;
    border: 1px solid #3a3834 !important;
    border-radius: 4px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    margin-top: 8px;
  }

  .cv-link:hover {
    color: var(--accent);
    border: 1px solid var(--accent) !important;
    background: var(--accent-glow);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ——— Responsive ——— */

  /* Tablet landscape & small desktop */
  @media (max-width: 1100px) {
    .container {
      gap: 60px;
      padding: 0 28px;
    }
    aside { padding: 80px 0; }
    main { padding: 80px 0; }
  }

  /* Tablet portrait & mobile — single column */
  @media (max-width: 900px) {
    .container {
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0 32px;
    }
    aside {
      position: relative;
      height: auto;
      padding: 100px 0 24px;
      max-width: 560px;
    }
    main {
      padding: 0 0 60px;
      max-width: 680px;
    }
    section { margin-bottom: 56px; }
    .card {
      grid-template-columns: 90px 1fr;
      gap: 16px;
      padding: 16px;
      margin: 0 -16px 8px;
    }
    .card .date { padding-top: 0; font-size: 0.68rem; }
    .lang-toggle { top: 16px; right: 16px; }
  }

  /* Phone */
  @media (max-width: 600px) {
    .container { padding: 0 20px; }
    aside { padding: 80px 0 20px; }
    .intro h1 { font-size: 3rem; }
    .intro .tagline { font-size: 1.2rem; }
    .intro .pitch { font-size: 0.92rem; }
    nav { margin-top: 36px; }
    section { margin-bottom: 48px; }
    .section-label {
      font-size: 0.68rem;
      padding: 16px 0 12px;
      margin-bottom: 20px;
    }
    .card {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .card .date {
      font-size: 0.7rem;
      padding-top: 0;
    }
    .card h3 { font-size: 1.2rem; }
    .skills-grid { gap: 24px; }
    .cv-link { font-size: 0.72rem; padding: 12px 16px; }
  }

  /* Very small phones */
  @media (max-width: 380px) {
    .container { padding: 0 16px; }
    .intro h1 { font-size: 2.6rem; }
    .lang-toggle { font-size: 0.68rem; padding: 3px; }
    .lang-toggle button { padding: 5px 9px; }
  }

  ::selection { background: var(--accent); color: var(--bg); }
</style>

  function setLanguage(lang) {
    const dict = i18n[lang];
    if (!dict) return;
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key] !== undefined) el.innerHTML = dict[key];
    });
    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    // Swap CV download link based on language
    const cv = document.getElementById('cv-download');
    if (cv) cv.href = lang === 'fr' ? './Ethan_Moyal_CV_FR.pdf' : './Ethan_Moyal_CV_EN.pdf';
  }

  const browserLang = (navigator.language || 'en').toLowerCase().startsWith('fr') ? 'fr' : 'en';
  setLanguage(browserLang);

  document.querySelectorAll('.lang-toggle button').forEach(btn => {
    btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
  });

  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('nav a[data-nav]');
  const navIo = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + id));
      }
    });
  }, { rootMargin: '-40% 0px -55% 0px' });
  sections.forEach(s => navIo.observe(s));
</script>
